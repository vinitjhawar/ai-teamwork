<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" role="img" aria-label="OpenTeam members">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c0a09"/>
      <stop offset="1" stop-color="#0a0908"/>
    </linearGradient>
    <filter id="centerShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="0" flood-color="#292524" flood-opacity="1"/>
    </filter>
  </defs>

  <rect width="1200" height="600" fill="url(#bg)"/>

  <g font-family="ui-monospace, 'SF Mono', Menlo, monospace" font-size="10" fill="#525252" letter-spacing="2">
    <text x="48" y="44">OPENTEAM</text>
    <text x="128" y="44" fill="#404040">/</text>
    <text x="144" y="44">MEMBERS</text>
    <text x="1152" y="44" text-anchor="end" fill="#737373">05 / 10 VISIBLE</text>
  </g>
  <line x1="48" y1="60" x2="1152" y2="60" stroke="#1c1917" stroke-width="1"/>

  <g transform="translate(330 340) rotate(-3)" opacity="0.75">
    <path d="M -110,-150 L 70,-150 L 110,-110 L 110,150 L -110,150 Z" fill="#171513" stroke="#292524" stroke-width="1"/>
    <line x1="70" y1="-150" x2="110" y2="-110" stroke="#292524" stroke-width="1"/>
    <text x="0" y="-70" text-anchor="middle" font-size="56">✏️</text>
    <text x="0" y="-20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" letter-spacing="2.5">THE EDITOR</text>
    <line x1="-32" y1="-4" x2="32" y2="-4" stroke="#292524" stroke-width="1"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">
      <text x="0" y="20">Flags tone, length,</text>
      <text x="0" y="38">rhythm, AI tells.</text>
      <text x="0" y="56">Cuts filler.</text>
    </g>
    <text x="-92" y="132" font-family="ui-monospace, monospace" font-size="9" fill="#404040" letter-spacing="2">08</text>
  </g>

  <g transform="translate(475 320) rotate(2)" opacity="0.9">
    <path d="M -110,-150 L 70,-150 L 110,-110 L 110,150 L -110,150 Z" fill="#1c1917" stroke="#292524" stroke-width="1"/>
    <line x1="70" y1="-150" x2="110" y2="-110" stroke="#292524" stroke-width="1"/>
    <text x="0" y="-70" text-anchor="middle" font-size="56">📊</text>
    <text x="0" y="-20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" letter-spacing="2.5">THE NUMBERS</text>
    <line x1="-32" y1="-4" x2="32" y2="-4" stroke="#292524" stroke-width="1"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">
      <text x="0" y="20">Demands sources</text>
      <text x="0" y="38">for every stat. No</text>
      <text x="0" y="56">claim without proof.</text>
    </g>
    <text x="-92" y="132" font-family="ui-monospace, monospace" font-size="9" fill="#404040" letter-spacing="2">03</text>
  </g>

  <g transform="translate(600 290)" filter="url(#centerShadow)">
    <path d="M -125,-165 L 80,-165 L 125,-120 L 125,165 L -125,165 Z" fill="#f59e0b" stroke="#fbbf24" stroke-width="1"/>
    <line x1="80" y1="-165" x2="125" y2="-120" stroke="#fbbf24" stroke-width="1"/>
    <text x="0" y="-80" text-anchor="middle" font-size="68">🤨</text>
    <text x="0" y="-26" text-anchor="middle" font-family="ui-monospace, monospace" font-size="12" fill="#0c0a09" letter-spacing="3" font-weight="600">THE SCEPTIC</text>
    <line x1="-36" y1="-10" x2="36" y2="-10" stroke="#0c0a09" stroke-width="1" opacity="0.4"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="14" fill="#0c0a09" text-anchor="middle">
      <text x="0" y="20">Tears apart</text>
      <text x="0" y="40">overclaims. Hates</text>
      <text x="0" y="60">hype. Makes you</text>
      <text x="0" y="80">earn every word.</text>
    </g>
    <text x="-105" y="146" font-family="ui-monospace, monospace" font-size="10" fill="#0c0a09" opacity="0.5" letter-spacing="2">01</text>
    <text x="105" y="146" text-anchor="end" font-family="ui-monospace, monospace" font-size="10" fill="#0c0a09" opacity="0.5" letter-spacing="2">ACTIVE</text>
  </g>

  <g transform="translate(725 320) rotate(-2)" opacity="0.9">
    <path d="M -110,-150 L 70,-150 L 110,-110 L 110,150 L -110,150 Z" fill="#1c1917" stroke="#292524" stroke-width="1"/>
    <line x1="70" y1="-150" x2="110" y2="-110" stroke="#292524" stroke-width="1"/>
    <text x="0" y="-70" text-anchor="middle" font-size="56">🙋</text>
    <text x="0" y="-20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" letter-spacing="2.5">THE END USER</text>
    <line x1="-32" y1="-4" x2="32" y2="-4" stroke="#292524" stroke-width="1"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">
      <text x="0" y="20">Asks what to do</text>
      <text x="0" y="38">Monday morning.</text>
      <text x="0" y="56">Hates abstractions.</text>
    </g>
    <text x="-92" y="132" font-family="ui-monospace, monospace" font-size="9" fill="#404040" letter-spacing="2">02</text>
  </g>

  <g transform="translate(870 340) rotate(3)" opacity="0.75">
    <path d="M -110,-150 L 70,-150 L 110,-110 L 110,150 L -110,150 Z" fill="#171513" stroke="#292524" stroke-width="1"/>
    <line x1="70" y1="-150" x2="110" y2="-110" stroke="#292524" stroke-width="1"/>
    <text x="0" y="-70" text-anchor="middle" font-size="56">🔄</text>
    <text x="0" y="-20" text-anchor="middle" font-family="ui-monospace, monospace" font-size="11" fill="#f59e0b" letter-spacing="2.5">THE CONTRARIAN</text>
    <line x1="-32" y1="-4" x2="32" y2="-4" stroke="#292524" stroke-width="1"/>
    <g font-family="ui-sans-serif, system-ui, sans-serif" font-size="12" fill="#a8a29e" text-anchor="middle">
      <text x="0" y="20">Argues the opposite</text>
      <text x="0" y="38">of whatever was</text>
      <text x="0" y="56">just said.</text>
    </g>
    <text x="-92" y="132" font-family="ui-monospace, monospace" font-size="9" fill="#404040" letter-spacing="2">04</text>
  </g>

  <g transform="translate(600 540)">
    <g font-family="ui-monospace, monospace" font-size="9" fill="#404040" letter-spacing="2">
      <line x1="-180" y1="0" x2="180" y2="0" stroke="#1c1917"/>
      <text x="0" y="22" text-anchor="middle" fill="#525252">EDITOR · NUMBERS · SCEPTIC · END USER · CONTRARIAN · VETERAN · OPTIMIST · COMPLIANCE · STRATEGIST · OUTSIDER</text>
    </g>
    <g transform="translate(0 38)">
      <circle cx="-72" cy="0" r="2" fill="#292524"/>
      <circle cx="-56" cy="0" r="2" fill="#292524"/>
      <circle cx="-40" cy="0" r="2" fill="#292524"/>
      <circle cx="-24" cy="0" r="2" fill="#292524"/>
      <circle cx="-8" cy="0" r="3" fill="#f59e0b"/>
      <circle cx="8" cy="0" r="2" fill="#292524"/>
      <circle cx="24" cy="0" r="2" fill="#292524"/>
      <circle cx="40" cy="0" r="2" fill="#292524"/>
      <circle cx="56" cy="0" r="2" fill="#292524"/>
      <circle cx="72" cy="0" r="2" fill="#292524"/>
    </g>
  </g>
</svg>
