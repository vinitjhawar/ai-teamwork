<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" role="img" aria-label="Three intensity modes" font-family="-apple-system, BlinkMacSystemFont, 'Inter', 'Segoe UI', system-ui, sans-serif">
  <rect width="1200" height="720" fill="#ffffff"/>

  <text x="600" y="90" text-anchor="middle" font-size="32" font-weight="500" fill="#0a0a0a">three modes. one question to pick.</text>
  <text x="600" y="130" text-anchor="middle" font-size="16" fill="#71717a">light for captions. heavy for anything you cannot take back.</text>

  <g transform="translate(200 220)">
    <rect x="-130" y="0" width="260" height="380" rx="8" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
    <text x="0" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#0a0a0a">light</text>
    <text x="0" y="78" text-anchor="middle" font-size="14" fill="#71717a">captions, replies</text>
    <line x1="-100" y1="106" x2="100" y2="106" stroke="#e4e4e7"/>
    <text x="0" y="150" text-anchor="middle" font-size="36" font-weight="600" fill="#0a0a0a">30s</text>
    <text x="0" y="178" text-anchor="middle" font-size="13" fill="#a1a1aa" letter-spacing="1.5">8K TOKENS</text>
    <line x1="-100" y1="216" x2="100" y2="216" stroke="#e4e4e7"/>
    <text x="0" y="252" text-anchor="middle" font-size="14" fill="#52525b">5 reviewers</text>
    <text x="0" y="278" text-anchor="middle" font-size="14" fill="#52525b">no debate</text>
    <text x="0" y="304" text-anchor="middle" font-size="14" fill="#52525b">no revision loop</text>
  </g>

  <g transform="translate(600 220)">
    <rect x="-130" y="0" width="260" height="380" rx="8" fill="#fafafa" stroke="#0a0a0a" stroke-width="1.5"/>
    <rect x="-50" y="-14" width="100" height="28" rx="14" fill="#0a0a0a"/>
    <text x="0" y="5" text-anchor="middle" font-size="11" fill="#ffffff" font-weight="600" letter-spacing="1.5">DEFAULT</text>
    <text x="0" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#0a0a0a">medium</text>
    <text x="0" y="78" text-anchor="middle" font-size="14" fill="#71717a">posts, drafts, plans</text>
    <line x1="-100" y1="106" x2="100" y2="106" stroke="#e4e4e7"/>
    <text x="0" y="150" text-anchor="middle" font-size="36" font-weight="600" fill="#0a0a0a">2m</text>
    <text x="0" y="178" text-anchor="middle" font-size="13" fill="#a1a1aa" letter-spacing="1.5">25K TOKENS</text>
    <line x1="-100" y1="216" x2="100" y2="216" stroke="#e4e4e7"/>
    <text x="0" y="252" text-anchor="middle" font-size="14" fill="#52525b">10 reviewers</text>
    <text x="0" y="278" text-anchor="middle" font-size="14" fill="#52525b">full debate</text>
    <text x="0" y="304" text-anchor="middle" font-size="14" fill="#52525b">1 revision loop</text>
  </g>

  <g transform="translate(1000 220)">
    <rect x="-130" y="0" width="260" height="380" rx="8" fill="#fafafa" stroke="#e4e4e7" stroke-width="1"/>
    <text x="0" y="46" text-anchor="middle" font-size="22" font-weight="600" fill="#0a0a0a">heavy</text>
    <text x="0" y="78" text-anchor="middle" font-size="14" fill="#71717a">launches, contracts</text>
    <line x1="-100" y1="106" x2="100" y2="106" stroke="#e4e4e7"/>
    <text x="0" y="150" text-anchor="middle" font-size="36" font-weight="600" fill="#0a0a0a">5m</text>
    <text x="0" y="178" text-anchor="middle" font-size="13" fill="#a1a1aa" letter-spacing="1.5">45K TOKENS</text>
    <line x1="-100" y1="216" x2="100" y2="216" stroke="#e4e4e7"/>
    <text x="0" y="252" text-anchor="middle" font-size="14" fill="#52525b">10 reviewers</text>
    <text x="0" y="278" text-anchor="middle" font-size="14" fill="#52525b">full debate</text>
    <text x="0" y="304" text-anchor="middle" font-size="14" fill="#52525b">up to 3 loops</text>
  </g>

  <text x="600" y="670" text-anchor="middle" font-size="16" fill="#71717a">council asks once. remembers your default. one word picks the mode.</text>
</svg>
