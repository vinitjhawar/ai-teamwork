<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 540" role="img" aria-label="Council architecture: light, medium, heavy">
  <rect width="880" height="540" fill="#0a0908"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Inter', system-ui, sans-serif" font-size="12" fill="#737373">
    <text x="48" y="40">architecture</text>
    <text x="832" y="40" text-anchor="end" fill="#525252">three modes  ·  one question</text>
  </g>
  <line x1="48" y1="56" x2="832" y2="56" stroke="#1c1917"/>

  <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="13" fill="#fafafa">
    <text x="170" y="100">light</text>
    <text x="440" y="100">medium</text>
    <text x="710" y="100">heavy</text>
  </g>
  <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#525252">
    <text x="170" y="118">captions, quick replies</text>
    <text x="440" y="118">posts, drafts, plans</text>
    <text x="710" y="118">launches, contracts, CVs</text>
  </g>

  <line x1="48" y1="140" x2="832" y2="140" stroke="#1c1917"/>

  <g transform="translate(170 0)">
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">
      <rect x="-70" y="170" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="190">intake</text>

      <line x1="0" y1="202" x2="0" y2="226" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,222 0,228 3,222" fill="#3f3a36"/>

      <rect x="-70" y="228" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="248">draft</text>

      <line x1="0" y1="260" x2="0" y2="284" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,280 0,286 3,280" fill="#3f3a36"/>

      <rect x="-70" y="286" width="140" height="58" rx="2" fill="#12100f" stroke="#f59e0b" stroke-width="1"/>
      <text x="0" y="306" fill="#fafafa">board</text>
      <text x="0" y="324" fill="#737373" font-size="10">5 members</text>

      <line x1="0" y1="344" x2="0" y2="392" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,388 0,394 3,388" fill="#3f3a36"/>

      <rect x="-70" y="394" width="140" height="32" rx="2" fill="#12100f" stroke="#22c55e" stroke-width="1"/>
      <text x="0" y="414" fill="#22c55e">output</text>
    </g>
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="0" y="460">~30 seconds</text>
      <text x="0" y="478">~8k tokens</text>
    </g>
  </g>

  <g transform="translate(440 0)">
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">
      <rect x="-70" y="170" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="190">intake</text>

      <line x1="0" y1="202" x2="0" y2="226" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,222 0,228 3,222" fill="#3f3a36"/>

      <rect x="-70" y="228" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="248">draft</text>

      <line x1="0" y1="260" x2="0" y2="284" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,280 0,286 3,280" fill="#3f3a36"/>

      <rect x="-70" y="286" width="140" height="58" rx="2" fill="#12100f" stroke="#f59e0b" stroke-width="1"/>
      <text x="0" y="306" fill="#fafafa">board debate</text>
      <text x="0" y="324" fill="#737373" font-size="10">10 members</text>

      <line x1="0" y1="344" x2="0" y2="368" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,364 0,370 3,364" fill="#3f3a36"/>

      <rect x="-70" y="370" width="140" height="32" rx="2" fill="#12100f" stroke="#262626" stroke-dasharray="3 2"/>
      <text x="0" y="390" fill="#737373" font-size="10">revise · up to 1×</text>

      <line x1="0" y1="402" x2="0" y2="426" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,422 0,428 3,422" fill="#3f3a36"/>

      <path d="M -50,386 Q -90,344 -50,300" fill="none" stroke="#3f3a36" stroke-width="0.8" stroke-dasharray="2 3"/>

      <rect x="-70" y="428" width="140" height="32" rx="2" fill="#12100f" stroke="#22c55e" stroke-width="1"/>
      <text x="0" y="448" fill="#22c55e">output</text>
    </g>
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="0" y="494">~2 minutes</text>
      <text x="0" y="512">~25k tokens</text>
    </g>
  </g>

  <g transform="translate(710 0)">
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#a8a29e" text-anchor="middle">
      <rect x="-70" y="170" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="190">intake</text>

      <line x1="0" y1="202" x2="0" y2="226" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,222 0,228 3,222" fill="#3f3a36"/>

      <rect x="-70" y="228" width="140" height="32" rx="2" fill="#12100f" stroke="#262626"/>
      <text x="0" y="248">draft</text>

      <line x1="0" y1="260" x2="0" y2="284" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,280 0,286 3,280" fill="#3f3a36"/>

      <rect x="-70" y="286" width="140" height="58" rx="2" fill="#12100f" stroke="#f59e0b" stroke-width="1"/>
      <text x="0" y="306" fill="#fafafa">board debate</text>
      <text x="0" y="324" fill="#737373" font-size="10">10 members</text>

      <line x1="0" y1="344" x2="0" y2="368" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,364 0,370 3,364" fill="#3f3a36"/>

      <rect x="-70" y="370" width="140" height="32" rx="2" fill="#12100f" stroke="#262626" stroke-dasharray="3 2"/>
      <text x="0" y="390" fill="#737373" font-size="10">revise · up to 3×</text>

      <line x1="0" y1="402" x2="0" y2="426" stroke="#3f3a36" stroke-width="1"/>
      <polygon points="-3,422 0,428 3,422" fill="#3f3a36"/>

      <path d="M -50,386 Q -100,344 -50,300" fill="none" stroke="#3f3a36" stroke-width="0.8" stroke-dasharray="2 3"/>
      <path d="M -54,386 Q -110,344 -54,300" fill="none" stroke="#3f3a36" stroke-width="0.6" stroke-dasharray="2 3" opacity="0.6"/>
      <path d="M -58,386 Q -120,344 -58,300" fill="none" stroke="#3f3a36" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>

      <rect x="-70" y="428" width="140" height="32" rx="2" fill="#12100f" stroke="#22c55e" stroke-width="1"/>
      <text x="0" y="448" fill="#22c55e">output</text>
    </g>
    <g font-family="-apple-system, 'Inter', system-ui, sans-serif" font-size="11" fill="#525252" text-anchor="middle">
      <text x="0" y="494">~5 minutes</text>
      <text x="0" y="512">~45k tokens</text>
    </g>
  </g>

  <line x1="310" y1="170" x2="310" y2="510" stroke="#1c1917" stroke-width="1" stroke-dasharray="2 4"/>
  <line x1="580" y1="170" x2="580" y2="510" stroke="#1c1917" stroke-width="1" stroke-dasharray="2 4"/>

  <line x1="48" y1="528" x2="832" y2="528" stroke="#1c1917"/>
</svg>
